<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiLingo AI - 現場の物流英語</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-32">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★
        // 注意: APIキーの取り扱いについて
        // ここに直接APIキーを貼ることは推奨されません（誰でも見られる状態になります）。
        // 本格的に公開する場合は、バックエンドサーバーを立ててキーを隠す必要があります。
        // 今回は個人利用のプロトタイプとして、ここにキーを記述して動作させます。
        // 外部にURLを共有しないようご注意ください。
        // ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★
        const apiKey = "YOUR_GEMINI_API_KEY_HERE"; // ←※ここに取得したAPIキーを入力してください

        // --- 以下、Reactアプリのコード ---
        
        async function fetchWithRetry(url, payload) {
          const delays = [1000, 2000, 4000, 8000, 16000];
          for (let i = 0; i <= delays.length; i++) {
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error(`API failed with status: ${response.status}`);
              return await response.json();
            } catch (e) {
              if (i === delays.length) throw e;
              await new Promise(r => setTimeout(r, delays[i]));
            }
          }
        }

        async function generateAITerms(reviewTerms = []) {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const reviewSubset = reviewTerms.sort(() => 0.5 - Math.random()).slice(0, 4);
          let reviewPrompt = "";
          if (reviewSubset.length > 0) {
            reviewPrompt = `
        【重要指示】以下の単語は、ユーザーが現在復習中の苦手な単語です。
        生成するリストの中に、これらの単語を**必ず**そのまま含めてください。
        ■ 復習単語：${JSON.stringify(reviewSubset.map(t => ({ en: t.en, ja: t.ja, example: t.example, exampleJa: t.exampleJa })))}
        上記の復習単語を含め、合計で10個になるように、残りの枠には新しい専門用語を追加してください。`;
          } else {
            reviewPrompt = "実務で頻繁に使われる高度な専門用語や略語を10個生成してください。";
          }

          const prompt = `あなたは物流・倉庫領域の専門コンサルタント向けの英語教師です。TOEIC 600点〜800点レベルのビジネスパーソンが使う実践的な単語を選んでください。${reviewPrompt}毎回異なる組み合わせにしてください。`;
          
          const schema = {
            type: "OBJECT",
            properties: {
              terms: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    en: { type: "STRING" }, ja: { type: "STRING" }, example: { type: "STRING" }, exampleJa: { type: "STRING" }
                  }
                }
              }
            }
          };

          const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: schema }
          };

          const data = await fetchWithRetry(url, payload);
          return JSON.parse(data.candidates[0].content.parts[0].text).terms;
        }

        async function generateAIScenario() {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const prompt = `あなたは物流・倉庫領域の専門家です。物流コンサルタント「Jane」と倉庫マネージャー「Joe」の英語での会話シナリオを作成してください。テーマは実践的な課題解決からランダムに設定してください。`;
          const schema = {
            type: "OBJECT",
            properties: {
              title: { type: "STRING" }, description: { type: "STRING" },
              dialogue: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: { speaker: { type: "STRING", enum: ["Jane", "Joe"] }, text: { type: "STRING" }, textJa: { type: "STRING" } }
                }
              }
            }
          };
          const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: schema }
          };
          const data = await fetchWithRetry(url, payload);
          return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        async function generateWordTTS(text) {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
          const payload = {
            contents: [{ parts: [{ text: text }] }],
            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } },
            model: "gemini-2.5-flash-preview-tts"
          };
          const data = await fetchWithRetry(url, payload);
          return processAudioData(data);
        }

        async function generateConversationTTS(dialogueArray) {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
          const dialogueText = dialogueArray.map(d => `${d.speaker}: ${d.text}`).join('\n');
          const payload = {
            contents: [{ parts: [{ text: dialogueText }] }],
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: {
                voiceConfig: {
                  multiSpeakerVoiceConfig: {
                    speakerVoiceConfigs: [
                      { speaker: "Jane", voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } },
                      { speaker: "Joe", voiceConfig: { prebuiltVoiceConfig: { voiceName: "Fenrir" } } }
                    ]
                  }
                }
              }
            },
            model: "gemini-2.5-flash-preview-tts"
          };
          const data = await fetchWithRetry(url, payload);
          return processAudioData(data);
        }

        function processAudioData(result) {
          const inlineData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
          if (inlineData && inlineData.data) {
            const binaryString = atob(inlineData.data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            let sampleRate = 24000;
            const rateMatch = inlineData.mimeType.match(/rate=(\d+)/);
            if (rateMatch) sampleRate = parseInt(rateMatch[1], 10);
            const wavBlob = pcmToWav(bytes.buffer, sampleRate);
            return URL.createObjectURL(wavBlob);
          }
          throw new Error("No audio data received.");
        }

        function pcmToWav(pcmData, sampleRate = 24000) {
          const numChannels = 1; const bitsPerSample = 16;
          const byteRate = (sampleRate * numChannels * bitsPerSample) / 8;
          const blockAlign = (numChannels * bitsPerSample) / 8;
          const dataSize = pcmData.byteLength;
          const buffer = new ArrayBuffer(44 + dataSize);
          const view = new DataView(buffer);

          const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
          };

          writeString(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
          writeString(8, 'WAVE'); writeString(12, 'fmt ');
          view.setUint32(16, 16, true); view.setUint16(20, 1, true);
          view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
          view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
          view.setUint16(34, bitsPerSample, true); writeString(36, 'data');
          view.setUint32(40, dataSize, true);

          const pcmView = new Uint8Array(pcmData);
          const wavDataView = new Uint8Array(buffer, 44);
          wavDataView.set(pcmView);

          return new Blob([buffer], { type: 'audio/wav' });
        }

        // --- Icons Helper (since we can't use Lucide React components directly in browser without bundler) ---
        // 代替としてLucideアイコンのSVGを直接描画するラッパー
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        root: iconRef.current
                    });
                }
            }, [name]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        // ==========================================
        // Main App Component
        // ==========================================
        function App() {
          const [currentView, setCurrentView] = useState('menu');
          const [termsData, setTermsData] = useState([]);
          const [isGeneratingTerms, setIsGeneratingTerms] = useState(false);
          const [scenarioData, setScenarioData] = useState(null);
          const [isGeneratingScenario, setIsGeneratingScenario] = useState(false);
          
          const [reviewTerms, setReviewTerms] = useState(() => {
            const saved = localStorage.getItem('logilingo_review_terms');
            return saved ? JSON.parse(saved) : [];
          });

          useEffect(() => {
            localStorage.setItem('logilingo_review_terms', JSON.stringify(reviewTerms));
          }, [reviewTerms]);

          const navigateTo = async (view) => {
            setCurrentView(view);
            window.scrollTo(0, 0);
            if ((view === 'flashcards' || view === 'quiz') && termsData.length === 0) handleGenerateNewTerms();
            if (view === 'listening' && !scenarioData) handleGenerateNewScenario();
          };

          const handleTermResult = (term, isKnown) => {
            setReviewTerms(prev => {
              if (isKnown) return prev.filter(t => t.en !== term.en);
              if (prev.some(t => t.en === term.en)) return prev;
              return [...prev, term];
            });
          };

          const handleGenerateNewTerms = async () => {
            setIsGeneratingTerms(true);
            try { setTermsData(await generateAITerms(reviewTerms)); } 
            catch (e) { alert("生成失敗"); } 
            finally { setIsGeneratingTerms(false); }
          };

          const handleGenerateNewScenario = async () => {
            setIsGeneratingScenario(true);
            try { setScenarioData(await generateAIScenario()); } 
            catch (e) { alert("生成失敗"); } 
            finally { setIsGeneratingScenario(false); }
          };

          return (
            <div>
              <header className="bg-white shadow-sm sticky top-0 z-10">
                <div className="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="bg-indigo-600 p-2 rounded-lg"><Icon name="sparkles" className="text-white w-6 h-6" /></div>
                    <div>
                      <h1 className="text-xl font-bold text-slate-900 leading-tight">LogiLingo <span className="text-indigo-600 text-sm">AI</span></h1>
                      <p className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">Dynamic English for Logistics</p>
                    </div>
                  </div>
                  {currentView !== 'menu' && (
                    <button onClick={() => setCurrentView('menu')} className="text-slate-500 hover:text-indigo-600 flex items-center gap-1 text-sm font-medium p-2">
                      <Icon name="chevron-left" className="w-5 h-5" /> Menu
                    </button>
                  )}
                </div>
              </header>

              <main className="max-w-3xl mx-auto px-4 py-6">
                {currentView === 'menu' && <MainMenu onSelect={navigateTo} reviewCount={reviewTerms.length} />}
                {currentView === 'flashcards' && (isGeneratingTerms ? <LoadingScreen text="AIが最新の用語を準備中..." /> : <FlashcardsView terms={termsData} onGenerateNew={handleGenerateNewTerms} onTermResult={handleTermResult} />)}
                {currentView === 'quiz' && (isGeneratingTerms ? <LoadingScreen text="AIがクイズを生成中..." /> : <QuizView terms={termsData} onTermResult={handleTermResult} />)}
                {currentView === 'listening' && (isGeneratingScenario ? <LoadingScreen text="AIがシナリオを執筆中..." /> : <ListeningView scenario={scenarioData} onGenerateNew={handleGenerateNewScenario} />)}
                {currentView === 'reviewList' && <ReviewListView terms={reviewTerms} onRemove={(term) => handleTermResult(term, true)} />}
              </main>
            </div>
          );
        }

        function LoadingScreen({ text }) {
          return (
            <div className="flex flex-col items-center justify-center py-20 text-indigo-600">
              <Icon name="loader-2" className="w-12 h-12 animate-spin mb-6" />
              <h3 className="text-lg font-bold text-slate-700">{text}</h3>
            </div>
          );
        }

        function MainMenu({ onSelect, reviewCount }) {
          return (
            <div className="space-y-6">
              <div className="grid gap-4 sm:grid-cols-2">
                <button onClick={() => onSelect('flashcards')} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-left">
                  <div className="bg-blue-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center mb-4"><Icon name="book-open" className="w-8 h-8"/></div>
                  <h3 className="text-lg font-bold">Daily Flashcards</h3>
                </button>
                <button onClick={() => onSelect('quiz')} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-left">
                  <div className="bg-emerald-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center mb-4"><Icon name="help-circle" className="w-8 h-8"/></div>
                  <h3 className="text-lg font-bold">Dynamic Quiz</h3>
                </button>
                <button onClick={() => onSelect('listening')} className="sm:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-left">
                  <div className="bg-indigo-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center mb-4"><Icon name="headphones" className="w-8 h-8"/></div>
                  <h3 className="text-lg font-bold">AI Conversation</h3>
                </button>
                <button onClick={() => onSelect('reviewList')} className="sm:col-span-2 bg-orange-50 border-2 border-orange-200 p-6 rounded-3xl text-left flex items-center justify-between">
                  <div className="flex items-center gap-4">
                    <div className="bg-orange-500 text-white w-12 h-12 rounded-xl flex items-center justify-center"><Icon name="bookmark" className="w-6 h-6"/></div>
                    <div><h3 className="text-lg font-bold text-orange-900">My Review List</h3></div>
                  </div>
                  <div className="bg-white px-4 py-2 rounded-full font-bold text-orange-600">{reviewCount} words</div>
                </button>
              </div>
            </div>
          );
        }

        function FlashcardsView({ terms, onGenerateNew, onTermResult }) {
          const [currentIndex, setCurrentIndex] = useState(0);
          const [isFlipped, setIsFlipped] = useState(false);
          const [isPlayingTTS, setIsPlayingTTS] = useState(false);
          const [isFinished, setIsFinished] = useState(false);
          const audioRef = useRef(null);

          if (!terms || terms.length === 0) return null;
          if (isFinished) {
            return (
              <div className="bg-white p-8 rounded-3xl text-center max-w-md mx-auto">
                <Icon name="check-circle-2" className="w-10 h-10 text-indigo-600 mx-auto mb-4" />
                <h2 className="text-2xl font-bold mb-4">Great Job!</h2>
                <button onClick={() => { setIsFinished(false); setCurrentIndex(0); onGenerateNew(); }} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl">Next Set</button>
              </div>
            );
          }

          const term = terms[currentIndex];
          
          const handleMark = (isKnown) => {
            onTermResult(term, isKnown);
            setIsFlipped(false);
            setTimeout(() => {
              if (currentIndex < terms.length - 1) setCurrentIndex(prev => prev + 1);
              else setIsFinished(true);
            }, 200);
          };

          const handlePlayAudio = async (e) => {
            e.stopPropagation();
            if (isPlayingTTS) return;
            setIsPlayingTTS(true);
            try {
              const audioUrl = await generateWordTTS(`${term.en}. ${term.example}`);
              if (audioRef.current) {
                audioRef.current.src = audioUrl;
                audioRef.current.play();
              }
            } catch (error) {
              setIsPlayingTTS(false);
            }
          };

          return (
            <div className="flex flex-col items-center w-full max-w-md mx-auto">
              <div className="w-full flex justify-between mb-6 text-sm text-slate-400"><span>TERM</span><span>{currentIndex + 1} / {terms.length}</span></div>
              <div className="w-full h-80 perspective-1000 cursor-pointer relative" onClick={() => !isFlipped && setIsFlipped(true)}>
                <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                  <div className="absolute w-full h-full backface-hidden bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center justify-center p-8 text-center">
                    <button onClick={handlePlayAudio} disabled={isPlayingTTS} className="absolute top-4 right-4 p-3 rounded-full bg-slate-50 text-indigo-600 hover:bg-indigo-50">
                      {isPlayingTTS ? <Icon name="loader-2" className="w-5 h-5 animate-spin" /> : <Icon name="volume-2" className="w-5 h-5" />}
                    </button>
                    <h3 className="text-3xl font-bold text-slate-800 mb-4">{term.en}</h3>
                    <p className="text-sm text-indigo-400">Tap to show answer</p>
                  </div>
                  <div className="absolute w-full h-full backface-hidden bg-indigo-600 rounded-3xl p-6 text-center rotate-y-180 text-white flex flex-col justify-center">
                    <h3 className="text-2xl font-bold mb-4">{term.ja}</h3>
                    <p className="text-sm italic">"{term.example}"</p>
                  </div>
                </div>
              </div>
              <div className="flex justify-center items-center w-full mt-8 gap-4 h-16">
                  {isFlipped && (
                    <div className="flex w-full gap-4">
                      <button onClick={(e) => { e.stopPropagation(); handleMark(false); }} className="flex-1 bg-rose-100 text-rose-700 font-bold py-4 rounded-2xl flex justify-center items-center gap-2"><Icon name="brain" className="w-5 h-5"/>Needs Review</button>
                      <button onClick={(e) => { e.stopPropagation(); handleMark(true); }} className="flex-1 bg-emerald-100 text-emerald-700 font-bold py-4 rounded-2xl flex justify-center items-center gap-2"><Icon name="thumbs-up" className="w-5 h-5"/>Got it</button>
                    </div>
                  )}
              </div>
              <audio ref={audioRef} onEnded={() => setIsPlayingTTS(false)} className="hidden" />
            </div>
          );
        }

        // Quiz and Listening simplified for this single file deployment demo...
        function QuizView({ terms, onTermResult }) { return <div className="text-center p-10 bg-white rounded-3xl">Quiz Feature Ready. (Simplified for this version)</div>; }
        function ListeningView({ scenario, onGenerateNew }) { return <div className="text-center p-10 bg-white rounded-3xl">Listening Feature Ready. (Simplified for this version)</div>; }
        
        function ReviewListView({ terms, onRemove }) {
          if(terms.length===0) return <div className="text-center p-10">No words to review!</div>;
          return (
            <div className="space-y-4 max-w-md mx-auto">
              {terms.map(t => (
                <div key={t.en} className="bg-white p-4 rounded-xl flex justify-between items-center">
                  <div><div className="font-bold">{t.en}</div><div className="text-sm text-slate-500">{t.ja}</div></div>
                  <button onClick={() => onRemove(t)} className="text-emerald-500"><Icon name="check-circle-2" className="w-6 h-6"/></button>
                </div>
              ))}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
      // Lucide icons initialization for initial render
      lucide.createIcons();
    </script>
</body>
</html>
